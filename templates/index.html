<!DOCTYPE html>
<html>

<head>

    <title>Bike Price Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="overlay">

<div class="card">

<div class="title">

<h4>BIKE PRICE PREDICTION</h4>

<h1>Predict Your Bike's Market Value Instantly</h1>

<p>Enter your bike details and get an instant resale value using Machine Learning.</p>

</div>

<form action="/predict" method="post">

<div class="grid">

<div>

<label>Brand</label>

<select name="Brand">
<option>Honda</option>
<option>Hero</option>
<option>Yamaha</option>
<option>TVS</option>
<option>Bajaj</option>
<option>Royal Enfield</option>
<option>KTM</option>
<option>Suzuki</option>
</select>

</div>

<div>

<label>Manufacturing Year</label>

<input type="number" name="Year" placeholder="2022" required>

</div>

<div>

<label>Kilometers Driven</label>

<input type="number" name="Kms" placeholder="25000" required>

</div>

<div>

<label>Owner Count</label>

<input type="number" name="Owner" placeholder="1" required>

</div>

<div>

<label>Engine CC</label>

<input type="number" name="Engine" placeholder="150" required>

</div>

<div>

<label>Fuel Type</label>

<select name="Fuel">
<option>Petrol</option>
</select>

</div>

<div class="full">

<label>Seller Type</label>

<select name="Seller">
<option>Dealer</option>
<option>Individual</option>
</select>

</div>

</div>

<button type="submit">

Predict Price

</button>

</form>

{% if prediction_text %}

<div class="result">

{{ prediction_text }}

</div>

{% endif %}

</div>

</div>

</body>

</html>
